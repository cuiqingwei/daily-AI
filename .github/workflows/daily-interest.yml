name: Daily Custom GitHub Search + AI Summary

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 → 北京时间 09:00
  workflow_dispatch:      # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore runtime state
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: .runtime/state.json
          key: runtime-state-${{ github.run_id }}
          restore-keys: |
            runtime-state-

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: '1.70.0' # Optional: pin to a stable recent version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run search & summarize
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_GROUP: ${{ secrets.PUSHPLUS_GROUP }}
          OLLAMA_HOST_IP: ${{ vars.OLLAMA_HOST_IP }} # 建议从 Variables 获取
        run: uv run search_and_summarize.py

      - name: Save runtime state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .runtime/state.json
          key: runtime-state-${{ github.run_id }}
